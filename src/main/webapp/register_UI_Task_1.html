<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Train Ticket System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        width: 100%;
        max-width: 400px;
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }

    .login-box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
    }

    textarea {
        resize: none;
        height: 70px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #1cc88a;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #17a673;
    }

    .register-text {
        text-align: center;
        margin-top: 15px;
        color: #555;
    }

    .register-text a {
        color: #4e73df;
        text-decoration: none;
        font-weight: bold;
    }
</style>

</head>
<body>

    <div class="login-container">
        <h1>Train Ticket System</h1>

        <div class="login-box">
            <h2>Create Account</h2>

            <form action="Servlet2" method="post">

                <label>Username</label>
                <input type="text" name="ename" required>

                <label>Email</label>
                <input type="email" name="eemail" required>

                <label>Password</label>
                <input type="password" name="epassword" required>

                <label>Address</label>
                <textarea name="eaddress" required></textarea>

                <label>Mobile Number</label>
                <input type="text" name="econtact" maxlength="10" required>

                <button type="submit">Register</button>

            </form>

            <p class="register-text">
                Already registered? <a href="index_UI_Task_1.html">Login here</a>
            </p>
        </div>
    </div>

</body>
</html>
